<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/T1VLcVxL/logo-2iba.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/T1VLcVxL/logo-2iba.jpg">
    
    <!-- Meta Tags para SEO e Redes Sociais (WhatsApp/Instagram) -->
    <title>2ª Igreja Batista de Areias | Crescendo em Cristo</title>
    <meta name="description" content="Acolhendo e servindo em amor. Acompanhe a 2ª Igreja Batista de Areias.">
    <meta property="og:title" content="2ª Igreja Batista de Areias | Crescendo em Cristo">
    <meta property="og:description" content="Página oficial de links da 2ª Igreja Batista de Areias.">
    <meta property="og:image" content="https://i.postimg.cc/T1VLcVxL/logo-2iba.jpg">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
            },
            colors: {
              brand: {
                green: '#527F46',
                bg: '#E2F2FB',
              }
            },
            animation: {
              'fade-in-down': 'fadeInDown 0.8s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
            },
            keyframes: {
              fadeInDown: {
                'from': { opacity: '0', transform: 'translateY(-30px)' },
                'to': { opacity: '1', transform: 'translateY(0)' }
              },
              fadeInUp: {
                'from': { opacity: '0', transform: 'translateY(30px)' },
                'to': { opacity: '1', transform: 'translateY(0)' }
              }
            }
          }
        }
      }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #E2F2FB;
            margin: 0;
            overflow-x: hidden;
        }
        
        #initial-loader {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #E2F2FB;
            z-index: 50;
            transition: opacity 0.5s ease-out;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(82, 127, 70, 0.1);
            border-left-color: #527F46;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .animate-fill-forwards {
            animation-fill-mode: forwards;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #E2F2FB; 
        }
        ::-webkit-scrollbar-thumb {
            background: #527F46; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel" data-presets="env,react,typescript">
        const { useState, useEffect } = React;

        const CONFIG = {
            mainTitle: "2ª Igreja Batista de Areias",
            title2: "Crescendo em Cristo",
            subtitle: "Acolhendo e servindo em amor",
            orgName: "2ª Igreja Batista de Areias",
            avatar: "https://i.postimg.cc/T1VLcVxL/logo-2iba.jpg",
            whatsapp: "5581998370066",
            cnpj: "11547361000179",
            formattedCnpj: "11.547.361/0001-79",
            bankInfo: "Santander - Ag.3757 - C.C 13000045-9"
        };

        const PG_DATA = {
            "pg-11-14": {
                title: "PG – 11 a 14",
                message: "Olá, quero entrar no PG de 11 a 14 anos, como faço?",
                contacts: [
                    { name: "Brenno", phone: "5581994070349" },
                    { name: "Thayna", phone: "5581996172467" }
                ]
            },
            "pg-15-17": {
                title: "PG – 15 a 17",
                message: "Olá, quero entrar no PG de 15 a 17 anos, como faço?",
                contacts: [
                    { name: "Davi", phone: "5581995461532" },
                    { name: "Mikely", phone: "5581975060863" }
                ]
            },
            "pg-18-plus": {
                title: "PG – 18+",
                message: "Olá, quero entrar no PG de 18+ anos, como faço?",
                contacts: [
                    { name: "Matheus", phone: "5581987135719" },
                    { name: "Stephanny", phone: "5581997159558" }
                ]
            }
        };

        const LINKS = [
            { 
                id: 11, 
                label: "CALENDÁRIO DE JANEIRO | 2026", 
                url: "https://www.instagram.com/p/DTAucQwkXXD/?hl=pt-br&img_index=1" 
            },
            { 
                id: 1, 
                label: "YOUTUBE", 
                url: "https://www.youtube.com/c/2aIgrejaBatistadeAreias" 
            },
            { 
                id: 2, 
                label: "Canal WhatsApp", 
                url: "https://www.whatsapp.com/channel/0029VaGtOo06BIEZeDmTCx3j?utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGnXBC4Hm7UlleTxgfAun_cuqtOcO4XtXOZSv10Fpf8r8_bi4xpgAByU_vYNlA_aem_fVUdOvmVck6Oh1eIzi8SHg" 
            },
            { 
                id: 10, 
                label: "Localização", 
                url: "https://maps.app.goo.gl/D6UdhjJzaVzMdDxt5" 
            },
            { 
                id: 3, 
                label: "PG – 11 a 14", 
                action: "view",
                viewId: "pg-11-14"
            },
            { 
                id: 4, 
                label: "PG - 15 a 17", 
                action: "view",
                viewId: "pg-15-17"
            },
            { 
                id: 5, 
                label: "PG - 18+", 
                action: "view",
                viewId: "pg-18-plus"
            },
            { 
                id: 6, 
                label: "Generosidade (PIX)", 
                action: "view",
                viewId: "generosidade"
            },
            { 
                id: 7, 
                label: "PODCAST", 
                url: "#",
                status: "manutenção"
            },
            { 
                id: 8, 
                label: "Trilho2iba - Juventude", 
                url: "https://www.instagram.com/trilho2iba/?hl=pt-br" 
            },
            { 
                id: 9, 
                label: "2iba em movimento - Correr/Caminhar", 
                url: "https://www.instagram.com/2ibamoving/?hl=pt-br" 
            }
        ];

        const LinkCard = ({ link, index, onClick }) => {
            const handleAction = (e) => {
                if (link.action === 'view') {
                    e.preventDefault();
                    onClick(link.viewId);
                }
            };

            const isManutencao = link.status === "manutenção";
            
            const baseClasses = "relative flex items-center justify-center w-full py-4 px-6 rounded-2xl font-bold text-base uppercase tracking-wider transition-all duration-300 transform hover:scale-[1.02] active:scale-95 animate-fade-in-up opacity-0 animate-fill-forwards shadow-lg text-center border-2 border-brand-green";
            const styleClasses = "bg-white text-brand-green hover:bg-brand-green hover:text-white";
            const disabledClasses = isManutencao ? "opacity-60 cursor-not-allowed pointer-events-none" : "cursor-pointer";

            return (
                <div className="relative w-full">
                    <a
                        href={link.url || "javascript:void(0)"}
                        target={link.url && link.url !== "#" ? "_blank" : "_self"}
                        rel="noreferrer"
                        className={`${baseClasses} ${styleClasses} ${disabledClasses}`}
                        style={{ animationDelay: `${(index + 1) * 100}ms` }}
                        onClick={handleAction}
                    >
                        {link.label}
                        {isManutencao && (
                            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[7px] font-bold opacity-70 tracking-tighter">
                                EM MANUTENÇÃO
                            </span>
                        )}
                    </a>
                </div>
            );
        };

        const App = () => {
            const [loaded, setLoaded] = useState(false);
            const [currentView, setCurrentView] = useState('main');
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                setLoaded(true);
                const loader = document.getElementById('initial-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, []);

            const handleCopyPix = () => {
                navigator.clipboard.writeText(CONFIG.cnpj);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const renderMainView = () => (
                <>
                    <header className="text-center mb-10 animate-fade-in-down w-full px-2 flex flex-col items-center">
                        <div className="relative inline-block mb-8 group cursor-pointer">
                            <div className="absolute -inset-4 bg-brand-green rounded-full blur-2xl opacity-15 group-hover:opacity-25 transition duration-700"></div>
                            <div className="relative w-36 h-36 sm:w-40 sm:h-40 rounded-full border-4 border-brand-green bg-white shadow-2xl overflow-hidden p-0.5">
                                <img 
                                    src={CONFIG.avatar} 
                                    className="w-full h-full rounded-full object-cover transition-transform duration-500 group-hover:scale-110" 
                                    alt="Logo Igreja" 
                                />
                            </div>
                        </div>
                        
                        <h1 className="text-2xl font-extrabold tracking-tight mb-1 text-brand-green uppercase leading-tight">
                            {CONFIG.mainTitle}
                        </h1>
                        <h2 className="text-lg font-bold tracking-tight mb-2 text-brand-green/90 uppercase leading-tight">
                            {CONFIG.title2}
                        </h2>
                        <p className="text-brand-green/70 font-medium text-xs sm:text-sm italic">
                            {CONFIG.subtitle}
                        </p>
                    </header>

                    <div className="w-full space-y-4 px-2">
                        {loaded && LINKS.map((link, i) => (
                            <LinkCard key={link.id} link={link} index={i} onClick={(id) => setCurrentView(id)} />
                        ))}
                    </div>
                </>
            );

            const renderContactView = (id) => {
                const data = PG_DATA[id];
                return (
                    <div className="w-full animate-fade-in-up">
                        <button 
                            onClick={() => setCurrentView('main')}
                            className="mb-8 flex items-center text-brand-green font-bold text-sm uppercase tracking-widest hover:opacity-70 transition-opacity"
                        >
                            <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7" />
                            </svg>
                            Voltar
                        </button>

                        <header className="text-center mb-12">
                            <h2 className="text-3xl font-extrabold text-brand-green uppercase mb-2 tracking-tight">
                                {data.title}
                            </h2>
                            <p className="text-brand-green/60 text-xs font-bold uppercase tracking-widest">
                                Selecione um contato abaixo:
                            </p>
                        </header>

                        <div className="space-y-4">
                            {data.contacts.map((contact, idx) => (
                                <a
                                    key={idx}
                                    href={`https://wa.me/${contact.phone}?text=${encodeURIComponent(data.message)}`}
                                    target="_blank"
                                    rel="noreferrer"
                                    className="flex items-center justify-between w-full py-5 px-8 bg-white border-2 border-brand-green rounded-2xl text-brand-green font-bold text-lg uppercase tracking-wider shadow-lg hover:bg-brand-green hover:text-white transition-all transform hover:scale-[1.02] active:scale-95"
                                >
                                    <span>{contact.name}</span>
                                    <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24">
                                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.01-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" />
                                    </svg>
                                </a>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderGenerosityView = () => (
                <div className="w-full animate-fade-in-up">
                    <button 
                        onClick={() => setCurrentView('main')}
                        className="mb-8 flex items-center text-brand-green font-bold text-sm uppercase tracking-widest hover:opacity-70 transition-opacity"
                    >
                        <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7" />
                        </svg>
                        Voltar
                    </button>

                    <header className="text-center mb-10">
                        <h2 className="text-3xl font-extrabold text-brand-green uppercase mb-4 tracking-tight">
                            Generosidade
                        </h2>
                        
                        <div className="bg-white/50 border-2 border-brand-green/20 rounded-3xl p-6 mb-8 text-brand-green shadow-inner">
                            <p className="font-bold text-lg mb-2">Pix/CNPJ: {CONFIG.formattedCnpj}</p>
                            <p className="text-sm font-medium opacity-80">{CONFIG.bankInfo}</p>
                        </div>

                        <p className="text-brand-green/60 text-[10px] font-bold uppercase tracking-[0.2em] mb-4">
                            Clique no botão abaixo para copiar a chave PIX:
                        </p>
                    </header>

                    <button
                        onClick={handleCopyPix}
                        className="flex flex-col items-center justify-center w-full py-6 px-8 bg-brand-green text-white rounded-2xl font-bold text-lg uppercase tracking-widest shadow-2xl hover:bg-brand-green/90 transition-all transform hover:scale-[1.02] active:scale-95 border-b-4 border-black/20"
                    >
                        <span className="text-2xl mb-1">{CONFIG.cnpj}</span>
                        <span className="text-[10px] opacity-70">
                            {copied ? "✓ COPIADO! COLE NO SEU BANCO" : "CLIQUE PARA COPIAR"}
                        </span>
                    </button>
                    
                    <div className="mt-8 text-center text-brand-green/50 text-xs italic">
                        "Cada um contribua segundo propôs no seu coração" <br/> 2 Co 9:7
                    </div>
                </div>
            );

            return (
                <div className="min-h-[100dvh] w-full relative overflow-x-hidden bg-brand-bg text-gray-800 flex flex-col items-center font-sans">
                    <main className="relative z-10 w-full max-w-md px-6 py-12 flex flex-col items-center min-h-[100dvh]">
                        
                        {currentView === 'main' ? renderMainView() : 
                         currentView === 'generosidade' ? renderGenerosityView() : 
                         renderContactView(currentView)}

                        <footer className="mt-auto pt-16 text-center animate-fade-in-up opacity-0 animate-fill-forwards w-full pb-8" style={{ animationDelay: '1000ms' }}>
                            <p className="text-[10px] text-gray-500 tracking-[0.2em] uppercase font-bold mb-2">
                                {CONFIG.orgName}
                            </p>
                            <p className="text-[10px] text-gray-400 tracking-[0.3em] uppercase font-medium">
                                © 2026 RECIFE - PE
                            </p>
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
